[workspace]
resolver = "2"
members = ["crates/units-worker"]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.86"
license = "MIT"
authors = ["Query Farm LLC <hello@query.farm>"]
repository = "https://github.com/Query-farm/vgi-units"

[workspace.dependencies]
# VGI Rust SDK (worker side), published on crates.io. Pulls in vgi-rpc 0.2 and
# arrow 58 transitively; keep arrow/vgi-rpc here in lockstep with vgi's pins so a
# single arrow/vgi-rpc resolves.
vgi = "0.5.0"
vgi-rpc = { version = "0.2.0", default-features = false, features = ["macros", "http"] }
arrow-array = "58"
arrow-buffer = "58"
arrow-schema = "58"

[profile.release]
opt-level = 2
